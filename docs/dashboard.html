<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AMAE Dashboard — AMAE</title>
<meta name="description" content="AMAE live dashboard — AMAE — 2026-W11">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--surface:#0d0d16;--card:#111120;--border:#1a1a2e;
  --amber:#f59e0b;--green:#10b981;--red:#ef4444;--blue:#3b82f6;
  --purple:#8b5cf6;--teal:#14b8a6;--pink:#ec4899;--orange:#f97316;
  --text:#e2e8f0;--muted:#94a3b8;--dim:#4a5568;--faint:#181830;
}
body{font-family:'IBM Plex Mono','Courier New',monospace;background:var(--bg);color:var(--text);font-size:12px;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#2d2d4a;border-radius:2px}
a{color:var(--amber)}
a:hover{text-decoration:underline}
code{background:var(--faint);padding:1px 5px;border-radius:2px;font-family:inherit;font-size:10px;color:var(--amber)}

/* header */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 22px 0}
.hdr-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:5px}
.brand{font-size:14px;font-weight:700;color:var(--amber);letter-spacing:.2em}
.brand-sub{font-size:7px;letter-spacing:.14em;color:var(--dim);margin-top:1px}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;gap:0}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;font-size:9px;letter-spacing:.09em;text-transform:uppercase;padding:8px 11px;color:var(--dim);white-space:nowrap}
.tab.on{color:var(--amber);border-bottom-color:var(--amber)}
.tab:hover:not(.on){color:var(--muted)}
.tab-badge{background:var(--amber);color:var(--bg);border-radius:8px;padding:0 4px;font-size:7px;font-weight:700;margin-left:3px}

/* pages */
.page{display:none;padding:16px 22px;max-width:1400px}
.page.on{display:block}

/* grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.fc{display:flex;flex-direction:column;gap:10px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:4px}
.p{padding:14px 18px}
.psm{padding:10px 12px}
.lbl{font-size:9px;letter-spacing:.11em;text-transform:uppercase;color:var(--dim)}
.stat{font-size:26px;font-weight:700;line-height:1;margin-bottom:5px}
.stat32{font-size:32px;font-weight:700;line-height:1}

/* atoms */
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chip{font-size:8px;padding:2px 6px;border-radius:2px;white-space:nowrap;letter-spacing:.05em}
.chip-sm{font-size:7px;padding:1px 4px}
.bar-w{height:3px;background:var(--faint);border-radius:2px;overflow:hidden}
.bar-h4{height:4px}
.bar-f{height:100%;transition:width .4s;border-radius:2px}
.div{height:1px;background:var(--faint);margin:10px 0}

/* alerts */
.alrt{padding:10px 14px;border-radius:3px;border-left:3px solid var(--amber);background:#f59e0b11}
.alrt-red{border-color:var(--red);background:#ef444411}
.alrt-green{border-color:var(--green);background:#10b98111}
.alrt-purple{border-color:var(--purple);background:#8b5cf611}

/* table */
.th{font-size:8px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--faint);padding-bottom:6px;margin-bottom:4px;display:grid;align-items:center}
.tr{padding:7px 0;border-bottom:1px solid var(--faint);display:grid;align-items:center}
.tr:hover{background:#0f0f1c}

/* pipeline */
.pipe{display:flex;align-items:center;overflow-x:auto;padding-bottom:4px}
.pn{text-align:center;min-width:66px;flex-shrink:0}
.pc{width:20px;height:20px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.pl{flex:1;height:1px;margin:0 1px;margin-bottom:18px}

/* quote */
.quote{padding:10px 14px;border-left:3px solid var(--amber);background:var(--faint);border-radius:0 3px 3px 0;font-style:italic;color:var(--amber)}

/* left-border box */
.lbx{padding:8px 12px;border-radius:3px;border-left:2px solid}

/* bg-faint box */
.fbx{padding:8px 10px;background:var(--faint);border-radius:3px}
.bbx{padding:9px 12px;background:var(--bg);border-radius:3px;border:1px solid var(--border)}

/* toggles */
.tgl{background:none;border:1px solid var(--dim);border-radius:2px;cursor:pointer;font-family:inherit;font-size:9px;letter-spacing:.05em;padding:3px 8px;color:var(--dim)}
.tgl.on{border-color:var(--amber);color:var(--amber)}

/* selects / inputs */
select,input,textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:11px;border-radius:3px;padding:5px 9px;outline:none;width:100%}
select:focus,input:focus,textarea:focus{border-color:var(--amber)}

.btn{background:none;border:1px solid var(--amber);border-radius:3px;cursor:pointer;font-family:inherit;font-size:9px;letter-spacing:.05em;padding:4px 10px;color:var(--amber);text-decoration:none;display:inline-block}
.btn-sm{padding:2px 7px;font-size:8px}
.btn-dim{border-color:var(--dim);color:var(--dim)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-purple{border-color:var(--purple);color:var(--purple)}

.footer{padding:14px 22px;font-size:8px;color:var(--dim);border-top:1px solid var(--border);margin-top:20px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.pulse{animation:pulse 2s infinite}
.blink{animation:blink 1s step-end infinite}
@media(max-width:680px){.g2,.g3,.g4,.g5{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-row">
    <div><div class="brand">AMAE</div><div class="brand-sub">AUTONOMOUS MARKETING ENGINE — v1</div></div>
    <div class="row" id="h-status"></div>
    <div class="row" id="h-stats" style="gap:18px"></div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>
<div id="pages">
  <div class="page on" id="pg-overview"></div>
  <div class="page" id="pg-intelligence"></div>
  <div class="page" id="pg-strategy"></div>
  <div class="page" id="pg-campaigns"></div>
  <div class="page" id="pg-content"></div>
  <div class="page" id="pg-media"></div>
  <div class="page" id="pg-distribution"></div>
  <div class="page" id="pg-evolution"></div>
  <div class="page" id="pg-github"></div>
  <div class="page" id="pg-marketplace"></div>
  <div class="page" id="pg-memory"></div>
  <div class="page" id="pg-resonance"></div>
  <div class="page" id="pg-config"></div>
  <div class="page" id="pg-devtools"></div>
  <div class="page" id="pg-cost"></div>
</div>
<div class="footer" id="footer"></div>

<script>

const $id = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtD = iso => iso ? new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}) : '—';
const ago  = iso => { if(!iso) return 'never'; const h=Math.floor((Date.now()-new Date(iso))/3600000); return h<1?'just now':h<24?h+'h ago':Math.floor(h/24)+'d ago'; };
const C = { amber:'#f59e0b',green:'#10b981',red:'#ef4444',blue:'#3b82f6',purple:'#8b5cf6',teal:'#14b8a6',dim:'#4a5568',muted:'#94a3b8',orange:'#f97316' };
const dot  = (c,p=false) => '<span class="dot'+(p?' pulse':'')+'" style="background:'+c+'"></span>';
const chip = (t,c='#4a5568',sm=false) => '<span class="chip'+(sm?' chip-sm':'')+'" style="background:'+c+'22;color:'+c+'">'+esc(t)+'</span>';
const bar  = (p,c='#f59e0b',h4=false) => '<div class="bar-w'+(h4?' bar-h4':'')+'"><div class="bar-f" style="width:'+Math.min(Math.max(p||0,0),100)+'%;background:'+c+'"></div></div>';
const lbl  = (t,mb=5) => '<div class="lbl" style="margin-bottom:'+mb+'px">'+esc(t)+'</div>';
const card = (inner,hl='',st='') => '<div class="card"'+(hl?' style="border-color:'+hl+'44"':'')+( st?' style="'+st+'"':'' )+'>'+inner+'</div>';
const alrt = (inner,t='amber') => '<div class="alrt'+(t!=='amber'?' alrt-'+t:'')+'">'+inner+'</div>';
const bbx  = inner => '<div class="bbx">'+inner+'</div>';
const lbx  = (inner,c) => '<div class="lbx" style="border-color:'+c+'">'+inner+'</div>';
const div  = () => '<div class="div"></div>';
const sect = (t,inner) => card('<div class="p"><div class="lbl" style="margin-bottom:12px">'+esc(t)+'</div>'+inner+'</div>');

/* tabs */
function initTabs(){
  const bar = $id('tabs');
  TABS.forEach(t=>{
    const b = document.createElement('button');
    b.className='tab'+(t.id==='overview'?' on':'');
    b.dataset.pid=t.id;
    const badge = t.id==='campaigns'?pendingCount:t.id==='evolution'?evoCount:0;
    b.innerHTML = esc(t.label)+(badge?'<span class="tab-badge">'+badge+'</span>':'');
    b.onclick=()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
      document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      $id('pg-'+t.id).classList.add('on');
    };
    bar.appendChild(b);
  });
}

function renderHeader(){
  const signals = LIVE.perf?.resonance_signals_total||0;
  const dnaPct  = LIVE.product.dna.pct;
  $id('h-status').innerHTML =
    dot(C.green,true)+' <span style="font-size:9px;color:#10b981;letter-spacing:.08em">ACTIVE</span>'+
    (dnaPct<100?' &nbsp; '+dot(C.red)+' <span style="font-size:9px;color:#ef4444" class="blink">&nbsp;DNA INCOMPLETE</span>':'')+
    (pendingCount?' &nbsp; '+dot(C.amber)+' <span style="font-size:9px;color:#f59e0b">&nbsp;'+pendingCount+' PR'+(pendingCount>1?'s':'')+' PENDING</span>':'');
  $id('h-stats').innerHTML = [
    {l:'Week',v:LIVE.meta.week},{l:'Product',v:esc(LIVE.product.name).substring(0,12)},
    {l:'Signals',v:signals},{l:'DNA',v:dnaPct+'%'},{l:'Week',v:'W'+weekNum()},
  ].map(s=>'<div style="text-align:right"><div class="lbl" style="margin-bottom:2px">'+s.l+'</div><div style="font-size:13px;font-weight:600;color:#f59e0b;line-height:1">'+s.v+'</div></div>').join('');
  $id('footer').innerHTML = 'Generated '+fmtD(LIVE.meta.generatedAt)+' by AMAE dashboard-builder.js &nbsp;·&nbsp; '+esc(LIVE.meta.week)+' &nbsp;·&nbsp; '+esc(LIVE.product.name)+' &nbsp;·&nbsp; <a href="https://github.com/Elghazawy5367/AMAE" target="_blank" rel="noopener">GitHub ↗</a>';
}

function weekNum(){ return LIVE.meta.week.replace(/.*-W/,''); }


function renderOverview(){
  const p   = LIVE.perf;
  const ins = LIVE.insights;
  const dna = LIVE.product.dna;
  const signals = p?.resonance_signals_total||0;
  const weeks   = p?.weeks_tracked||0;
  const weeksWO = p?.weeks_without_resonance||0;

  const pipeline = [
    {s:'Copy Excavator',t:'Tue 04:00',c:'done'},{s:'Timing Scout',t:'Tue 04:08',c:'done'},
    {s:'Competitor Intel',t:'Tue 04:15',c:'done'},{s:'Synthesis',t:'Tue 04:30',c:'done'},
    {s:'Memory Parse',t:'Thu 06:00',c:'done'},{s:'4-Persona Strategy',t:'Thu 06:05',c:'done'},
    {s:'Content Factory',t:'Thu 06:12',c:'done'},{s:'Media Gen',t:'Thu 06:25',c:'done'},
    {s:'Guardrail',t:'Thu 06:38',c:'done'},{s:'PR Filed',t:'Thu 06:50',c:'done'},
    {s:'Founder Review',t:'You (Fri)',c:'pending'},{s:'Auto-Publish',t:'On merge',c:'waiting'},
  ];
  const pipeHtml = pipeline.map((item,i,arr)=>{
    const cl = item.c==='done'?C.green:item.c==='pending'?C.amber:C.dim;
    const ic = item.c==='done'?'✓':item.c==='pending'?'!':'·';
    return '<div class="pn"><div class="pc" style="background:'+cl+'22;border:1px solid '+cl+';color:'+cl+'">'+ic+'</div>'
      +'<div style="font-size:7.5px;font-weight:600;color:'+cl+';line-height:1.3">'+esc(item.s)+'</div>'
      +'<div style="font-size:6.5px;color:#4a5568;margin-top:1px">'+esc(item.t)+'</div></div>'
      +(i<arr.length-1?'<div class="pl" style="background:'+cl+'33"></div>':'');
  }).join('');

  const metCards = [
    {l:'Resonance Signals',v:signals,c:signals>=3?C.green:C.amber,note:'Real audience signals logged'},
    {l:'Weeks Running',    v:weeks,  c:C.amber, note:'Weeks with at least one campaign'},
    {l:'Weeks No Signal',  v:weeksWO,c:weeksWO>=4?C.red:C.dim, note:weeksWO>=6?'⚠ Review the_desire section':'On track'},
    {l:'Product Stage',    v:esc(LIVE.product.stage),c:C.blue, note:'Set in product-dna.json'},
  ].map(m=>card('<div class="psm">'+lbl(m.l)+'<div class="stat" style="color:'+m.c+'">'+m.v+'</div><div style="font-size:8px;color:#4a5568">'+m.note+'</div></div>','')).join('');

  const dnaCard = card('<div class="psm">'+lbl('Product DNA')
    +'<div class="stat" style="color:'+(dna.pct<100?C.amber:C.green)+'">'+dna.pct+'%</div>'
    +bar(dna.pct,dna.pct<100?C.amber:C.green,true)
    +'<div style="margin-top:8px">'
    +dna.missing.map(f=>'<div class="row" style="gap:5px;margin-bottom:4px">'+dot(C.red)+'<span style="font-size:9px;color:#ef4444">'+esc(f)+'</span></div>').join('')
    +'</div></div>', dna.pct<100?C.red:C.green);

  const recCard = card('<div class="p">'+lbl('AMAE Recommendation')
    +'<div class="quote" style="margin-top:8px;font-size:11px;line-height:1.7">'+esc(ins?.recommendation||'No data yet — run first campaign.')+'</div>'
    +(ins?.alert?'<div style="margin-top:8px;padding:6px;background:#ef444411;border-radius:2px;font-size:8px;color:#ef4444">'+esc(ins.alert)+'</div>':'')
    +'</div>','');

  const wfHtml = REPO.workflows.map(w=>{
    const c = C.dim;
    return card('<div class="psm"><div class="row" style="gap:5px;margin-bottom:4px">'+dot(c)+'<span style="font-size:9px;font-weight:600;color:#94a3b8">'+esc(w.label)+'</span></div>'
      +'<div style="font-size:8px;color:#4a5568">'+esc(w.day)+'</div>'
      +'<div style="font-size:7px;color:#4a5568;margin-top:2px;line-height:1.3">'+esc(w.desc)+'</div></div>');
  }).join('');

  const working = ins?.what_is_working?.length
    ? card('<div class="p">'+lbl('What Is Working',10)
        +ins.what_is_working.map(w=>'<div class="row" style="gap:6px;margin-bottom:5px">'+dot(C.green)+'<span style="font-size:10px;color:#94a3b8">'+esc(w)+'</span></div>').join('')
        +'</div>',C.green) : '';
  const notWorking = ins?.what_is_not_working?.length
    ? card('<div class="p">'+lbl('What Is Not Working',10)
        +ins.what_is_not_working.map(w=>'<div class="row" style="gap:6px;margin-bottom:5px">'+dot(C.red)+'<span style="font-size:10px;color:#94a3b8">'+esc(w)+'</span></div>').join('')
        +'</div>','') : '';

  const phases = [
    {n:'Phase 1 — Skeleton',done:true},
    {n:'Phase 2 — Campaign Engine',done:true},
    {n:'Phase 3 — Intelligence',done:true},
    {n:'Phase 4 — Distribution',done:false,active:true},
    {n:'Phase 5 — Secret Sauce',done:false,locked:true},
    {n:'Phase 6 — Product',done:false,locked:true},
  ].map(p=>'<div class="row" style="gap:7px;margin-bottom:7px"><span style="color:'+(p.done?C.green:p.active?C.amber:C.dim)+';font-size:10px;width:12px">'+(p.done?'✓':p.active?'▶':'○')+'</span><span style="font-size:9px;color:'+(p.done?C.muted:p.active?C.amber:C.dim)+'">'+esc(p.n)+(p.locked?' 🔒':'')+'</span></div>').join('');

  const warn6 = (ins?.alert==='6_week_warning'||weeksWO>=6) ? alrt('<div style="font-size:10px;font-weight:600;color:#f59e0b;margin-bottom:4px">⚠ 6-Week Warning</div><div style="font-size:9px;color:#94a3b8">No resonance signals for 6 weeks. Re-run Desire Discovery Protocol. Revisit the_desire section in product-dna.json.</div>') : '';

  const log = LIVE.resonanceLog
    ? card('<div class="p">'+lbl('analytics/resonance-log.md')
        +'<pre style="font-size:9px;color:#4a5568;white-space:pre-wrap;max-height:80px;overflow:hidden;margin-top:6px">'
        +esc(LIVE.resonanceLog.split('\n').filter(Boolean).slice(-6).join('\n'))
        +'</pre><div style="font-size:8px;color:#4a5568;margin-top:4px">Update this file after each real audience signal.</div></div>') : '';

  $id('pg-overview').innerHTML = '<div class="fc">'
    +warn6
    +card('<div class="p">'+lbl('Weekly Automation Pipeline — '+LIVE.meta.week,'12')+'<div class="pipe">'+pipeHtml+'</div></div>')
    +'<div class="g4">'+metCards+'</div>'
    +'<div class="g3">'+dnaCard+recCard+card('<div class="p">'+lbl('Build Progress')+phases+'</div>')+'</div>'
    +(working||notWorking?'<div class="g2">'+working+notWorking+'</div>':'')
    +(log||'')
    +'<div class="g4">'+wfHtml+'</div>'
    +'</div>';
}


function renderIntelligence(){
  const brief = LIVE.synthBrief;
  const hooks = LIVE.hookPerf?.top_hooks||LIVE.hookPerf?.best_performing||[];

  const briefCard = brief
    ? card('<div class="p">'+lbl('Synthesis Brief — intelligence/weekly/ — current week')
        +'<div class="quote" style="margin:8px 0;font-size:10px;line-height:1.7">'+esc(brief.split('\n').slice(0,10).join(' ').substring(0,700))+'</div>'
        +'<div style="font-size:8px;color:#4a5568">Written by intelligence-synthesizer.js every Tuesday</div></div>',C.amber)
    : card('<div class="psm">'+lbl('Synthesis Brief')+'<div style="color:#4a5568;font-size:10px;margin-top:6px">No brief yet — appears after first Tuesday 04:00 UTC intelligence run.</div></div>','');

  const agentGrid = '<div class="g3" style="gap:8px">'
    +REPO.intel_agents.map(a=>'<div class="bbx"><div class="row" style="gap:5px;margin-bottom:4px">'+dot(C.green)+'<span style="font-size:10px;font-weight:600;color:#94a3b8">'+esc(a.label)+'</span></div>'
      +'<div style="font-size:8px;color:#4a5568;line-height:1.4;margin-bottom:4px">'+esc(a.desc)+'</div>'
      +'<div class="row" style="gap:4px"><code>'+esc(a.file)+'</code>'+chip('→ '+a.output,C.dim,true)+'</div></div>').join('')
    +'</div>';

  const hooksCard = hooks.length
    ? card('<div class="p">'+lbl('Top Hooks — memory/hook-performance.json')
        +'<div class="th" style="grid-template-columns:1fr 60px 60px;margin-top:8px"><span>Hook</span><span>Platform</span><span>Signals</span></div>'
        +hooks.slice(0,6).map(h=>'<div class="tr" style="grid-template-columns:1fr 60px 60px"><span style="font-size:10px;color:#94a3b8">'+esc((h.hook||h.formula||h.text||'—').substring(0,60))+'</span>'+chip(h.platform||h.stage||'—',C.blue,true)+chip((h.signal_rate?h.signal_rate+'%':h.signals||0)+'',C.green,true)+'</div>').join('')
        +'</div>','')
    : card('<div class="psm">'+lbl('Hook Performance')+'<div style="color:#4a5568;font-size:10px;margin-top:4px">Populated after first campaigns run.</div></div>','');

  const dirsHtml = '<div class="g2">'
    +REPO.intel_dirs.map(d=>lbx('<div style="font-size:9px;color:#3b82f6;font-weight:600;margin-bottom:2px">'+esc(d.path)+'</div><div style="font-size:8px;color:#4a5568;line-height:1.4">'+esc(d.desc)+'</div>',C.blue+'33')).join('')
    +'</div>';

  const subreddits = (LIVE.subreddits||[]).map(s=>chip(s,C.teal,true)).join(' ');
  const intelCfgCard = card('<div class="p">'+lbl('Intelligence Config — intelligence-config.json')
    +'<div style="margin-top:8px"><div style="font-size:9px;color:#94a3b8;margin-bottom:6px">Mining targets:</div>'
    +'<div class="row" style="gap:4px;flex-wrap:wrap">'+subreddits+'</div>'
    +(LIVE.subreddits?.length?'<div style="font-size:8px;color:#4a5568;margin-top:4px">+HN Algolia + GitHub Trending + competitor repos</div>':'')
    +'</div></div>','');

  $id('pg-intelligence').innerHTML = '<div class="fc">'
    +briefCard
    +sect('7 Intelligence Agents — weekly-intelligence.yml · Tue 04:00 UTC',agentGrid)
    +hooksCard
    +sect('Intelligence Directories',dirsHtml)
    +intelCfgCard
    +'</div>';
}


function renderStrategy(){
  const personas = [
    {n:'Direct Response Copywriter',c:C.amber,lens:'Hook → Problem → Agitate → Solve → CTA',rec:'Lead with verbatim Reddit phrase. Stage 2 audience needs pain named precisely, not features listed.'},
    {n:'Brand Strategist',c:C.blue,lens:'Long-term mental availability over short-term conversion',rec:'Build the founder as face of brand. Personal story arc, not product features. Consistency over cleverness.'},
    {n:'Growth Hacker',c:C.green,lens:'Viral coefficient and distribution surface area',rec:'Optimize for shares, not likes. Make the post quotable. Identity-signal for ICP — they share things that represent who they are.'},
    {n:'Audience Psychologist',c:C.purple,lens:'Desire mapping and awareness stage alignment',rec:'Stage 2 = name the pain, resist selling. Save product mention for line 8+. Match language exactly.'},

  const pHTML = '<div class="g2">'+personas.map(p=>card('<div class="p"><div class="row" style="gap:6px;margin-bottom:8px">'+chip('Persona',p.c)+'<span style="font-size:11px;font-weight:600;color:#e2e8f0">'+esc(p.n)+'</span></div>'

    +'</div>')).join('')+'</div>';

  const levers = [
    {stage:'TOFU / Stage 1–2',l:['Loss Aversion','FOMO','Identity'],note:'Unaware → awareness. Never mention product first.'},
    {stage:'MOFU / Stage 3',  l:['Authority','Social Proof','Reciprocity'],note:'Solution-aware. Build trust, show proof.'},

    +'<div style="font-size:8px;color:#4a5568">'+esc(s.note)+'</div></div>').join('')+'</div>';

  const funnelMap = [
    {c:'LinkedIn post — the manual trap',stage:'TOFU',col:C.blue,note:'Gets shared by people who feel seen'},
    {c:'Twitter thread — 5 signs you are the bottleneck',stage:'TOFU',col:C.blue,note:'High share potential'},
    {c:'AEO Blog — marketing automation for solo founders',stage:'MOFU',col:C.teal,note:'Search + AI citation target'},
    {c:'LinkedIn carousel — product vs manual workflow',stage:'BOFU',col:C.purple,note:'Warm audience only'},
    {c:'Email sequence — welcome series',stage:'BOFU',col:C.purple,note:'email-sequence-agent.js output'},

  const funnelHTML = '<div class="th" style="grid-template-columns:55px 1fr 170px;margin-top:8px"><span>Stage</span><span>Content</span><span>Note</span></div>'
    +funnelMap.map(r=>'<div class="tr" style="grid-template-columns:55px 1fr 170px">'+chip(r.stage,r.col)+'<span style="font-size:10px;color:#94a3b8">'+esc(r.c)+'</span><span style="font-size:9px;color:#4a5568">'+esc(r.note)+'</span></div>').join('');

  $id('pg-strategy').innerHTML = '<div class="fc">'

function renderContent(){
  let section = 'prompts';
  function draw(){
    let html = '<div class="fc">';
    html += '<div class="row" style="gap:6px;margin-bottom:2px">'
      +['prompts','rules','templates'].map(s=>'<button class="tgl'+(section===s?' on':'')+'" onclick="contentSection=\''+s+'\';renderContent()">'+{prompts:'Prompt Files (35)',rules:'Platform Rules',templates:'Templates (7)'}[s]+'</button>').join('')+'</div>';

    if(section==='prompts'){
      html += Object.entries(REPO.prompts).map(([g,files])=>
        sect(g.charAt(0).toUpperCase()+g.slice(1)+' Prompts ('+files.length+') — .github/prompts/',
          '<div class="g4" style="margin-top:4px">'+files.map(f=>'<div class="bbx"><div style="font-size:9px;color:#94a3b8">'+esc(f)+'.prompt.md</div></div>').join('')+'</div>')
      ).join('');
      html += '<div style="padding:8px 12px;background:var(--faint);border-radius:3px;font-size:8px;color:#4a5568">All prompts end with: Output ONLY [content type]. No commentary. · Dynamic values in [BRACKETS]</div>';
    }
    if(section==='rules'){
      const rules = LIVE.platRulesLive && Object.keys(LIVE.platRulesLive).filter(k=>!k.startsWith('_')).length
        ? Object.entries(LIVE.platRulesLive).filter(([k])=>!k.startsWith('_')).map(([k,v])=>{
            const r = v.algorithm_signals_ranked||v.hook_rules||v.winning_formats;
            const ruleList = [
              v.max_chars?'Max '+v.max_chars+' chars':null,
              v.optimal_chars?'Optimal '+v.optimal_chars+' chars':null,
              v.external_links?'Links: '+v.external_links:null,
              v.hook_rules?.never_start_with?'Never start: '+v.hook_rules.never_start_with.join(', '):null,
              v.algorithm_signals_ranked?'Algorithm: '+v.algorithm_signals_ranked.join(' › '):null,
              v.post_frequency||null,
            ].filter(Boolean);
            return card('<div class="psm"><div style="font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:8px;text-transform:capitalize">'+esc(k.replace('_',' '))+'</div>'
              +ruleList.map(r=>'<div class="row" style="gap:5px;margin-bottom:4px"><span style="color:#4a5568;font-size:9px">·</span><span style="font-size:9px;color:#4a5568">'+esc(r)+'</span></div>').join('')
              +'</div>');
          })
        : Object.entries(REPO.platform_rules).map(([k,pf])=>
            card('<div class="psm"><div style="font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:8px">'+esc(pf.label)+'</div>'
              +pf.rules.map(r=>'<div class="row" style="gap:5px;margin-bottom:4px"><span style="color:'+(r.includes('HUMAN')||r.includes('AMAE writes')?C.amber:C.dim)+';font-size:9px">·</span><span style="font-size:9px;color:'+(r.includes('HUMAN')?C.amber:C.dim)+';line-height:1.4">'+esc(r)+'</span></div>').join('')
              +'</div>'));
      html += '<div class="g2">'+rules.join('')+'</div>';
    }
    if(section==='templates'){
      html += '<div class="g2">'+REPO.templates.map(t=>card('<div class="p"><div style="font-size:10px;font-weight:600;color:#94a3b8;margin-bottom:4px">'+esc(t.file)+'</div><div style="font-size:9px;color:#4a5568;margin-bottom:4px">'+esc(t.desc)+'</div><code>templates/'+esc(t.file)+'</code></div>')).join('')+'</div>';
    }
    html += '</div>';
    $id('pg-content').innerHTML = html;
  }
  window.contentSection = section;
  // re-render on toggle — overwrite onclick to use window var
  function drawWithState(){
    section = window.contentSection||'prompts';
    $id('pg-content').innerHTML = '<div class="fc">'
      +'<div class="row" style="gap:6px;margin-bottom:2px">'
      +['prompts','rules','templates'].map(s=>'<button class="tgl'+(section===s?' on':'')+'" onclick="window.contentSection=\''+s+'\';renderContent()">'+{prompts:'Prompt Files (35)',rules:'Platform Rules',templates:'Templates (7)'}[s]+'</button>').join('')+'</div>';
    // rest rendered below via flag
    renderContentSection(section);
  }
  drawWithState();
}
function renderContentSection(section){
  const container = $id('pg-content');
  const existing = container.querySelector('.fc');
  if(!existing) return;

  let inner = '';
  if(section==='prompts'){
    inner = Object.entries(REPO.prompts).map(([g,files])=>
      sect(g.charAt(0).toUpperCase()+g.slice(1)+' Prompts ('+files.length+') — .github/prompts/',
        '<div class="g4" style="margin-top:4px">'+files.map(f=>'<div class="bbx"><div style="font-size:9px;color:#94a3b8">'+esc(f)+'.prompt.md</div></div>').join('')+'</div>')
    ).join('')+'<div style="padding:8px 12px;background:var(--faint);border-radius:3px;font-size:8px;color:#4a5568">All prompts: role definition line 1 · dynamic values in [BRACKETS] · ends with: Output ONLY [type]. No commentary.</div>';
  }
  if(section==='rules'){
    const rules = Object.entries(REPO.platform_rules).map(([k,pf])=>
      card('<div class="psm"><div style="font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:8px">'+esc(pf.label)+'</div>'
        +pf.rules.map(r=>'<div class="row" style="gap:5px;margin-bottom:4px"><span style="font-size:9px;color:'+(r.includes('HUMAN')||r.includes('AMAE writes')?C.amber:C.dim)+'">·</span><span style="font-size:9px;color:'+(r.includes('HUMAN')?C.amber:C.dim)+';line-height:1.4">'+esc(r)+'</span></div>').join('')
        +'</div>'));
    inner = '<div class="g2">'+rules.join('')+'</div>';
  }
  if(section==='templates'){
    inner = '<div class="g2">'+REPO.templates.map(t=>card('<div class="p"><div style="font-size:10px;font-weight:600;color:#94a3b8;margin-bottom:4px">'+esc(t.file)+'</div><div style="font-size:9px;color:#4a5568;margin-bottom:4px">'+esc(t.desc)+'</div><code>templates/'+esc(t.file)+'</code></div>')).join('')+'</div>';
  }
  existing.innerHTML = existing.innerHTML.split('<div class="card">')[0] + inner
    + (inner ? '' : '');
  // Simpler: just replace the whole page
  $id('pg-content').innerHTML = '<div class="fc">'
    +'<div class="row" style="gap:6px">'
    +['prompts','rules','templates'].map(s=>'<button class="tgl'+(section===s?' on':'')+'" onclick="window.contentSection=\''+s+'\';renderContentSection(window.contentSection)">'+{prompts:'Prompt Files (35)',rules:'Platform Rules',templates:'Templates (7)'}[s]+'</button>').join('')+'</div>'
    +inner+'</div>';
}
