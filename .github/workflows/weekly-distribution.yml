# === FILE: .github/workflows/weekly-distribution.yml === 
# Job: Friday 8am UTC scheduled distribution (time-spaced posting) 
# Triggered: Friday 8:00am UTC, OR manually 
# Distinct from on-pr-merge-distribute.yml (which fires immediately on merge) 
# This workflow spaces platform posts to avoid simultaneous burst posting 
 
name: Weekly Distribution — Friday 
 
on: 
  schedule: 
    - cron: '0 8 * * 5'   # Friday 8:00am UTC 
  workflow_dispatch: 
    inputs: 
      week_override: 
        description: 'Week to distribute (e.g. 2026-W12). Blank = current week.' 
        required: false 
 
permissions: 
  contents: write 
  pull-requests: write 
 
jobs: 
  distribute: 
    name: Distribute Campaign Content 
    runs-on: ubuntu-latest 
    timeout-minutes: 45 
 
    steps: 
      - name: Checkout 
        uses: actions/checkout@v4 
        with: 
          token: ${{ secrets.GITHUB_TOKEN }} 
 
      - name: Setup Node 20 
        uses: actions/setup-node@v4 
        with: 
          node-version: '20' 
          cache: 'npm' 
 
      - name: Install dependencies 
        run: npm ci 
 
      - name: Check — is there a merged campaign for this week? 
        id: check 
        run: | 
          WEEK="${{ github.event.inputs.week_override }}" 
          if [ -z "$WEEK" ]; then 
            WEEK=$(node --input-type=module -e "import { getCurrentWeek } from './lib/week-utils.js'; process.stdout.write(getCurrentWeek())") 
          fi 
          echo "week=$WEEK" >> $GITHUB_OUTPUT 
          if [ -d "campaigns/$WEEK/text" ]; then 
            echo "has_campaign=true" >> $GITHUB_OUTPUT 
            echo "Found campaign: $WEEK" 
          else 
            echo "has_campaign=false" >> $GITHUB_OUTPUT 
            echo "No campaign found for $WEEK — skipping distribution" 
          fi 
 
      - name: Distribute — LinkedIn (first, highest ICP reach) 
        if: steps.check.outputs.has_campaign == 'true' 
        env: 
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }} 
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }} 
          CONTENT_FILE: campaigns/${{ steps.check.outputs.week }}/text/linkedin-posts.md 
        run: node agents/dist-linkedin.js 
 
      - name: Wait 90 minutes (spacing LinkedIn → Twitter) 
        if: steps.check.outputs.has_campaign == 'true' 
        run: sleep 5400 
 
      - name: Distribute — Twitter/X thread 
        if: steps.check.outputs.has_campaign == 'true' 
        env: 
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }} 
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }} 
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }} 
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }} 
          CONTENT_FILE: campaigns/${{ steps.check.outputs.week }}/text/twitter-x-threads.md 
        run: node agents/dist-twitter-x.js 
 
      - name: Wait 30 minutes (Twitter → Threads) 
        if: steps.check.outputs.has_campaign == 'true' 
        run: sleep 1800 
 
      - name: Distribute — Threads 
        if: steps.check.outputs.has_campaign == 'true' 
        env: 
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }} 
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }} 
          CONTENT_FILE: campaigns/${{ steps.check.outputs.week }}/text/threads-posts.md 
        run: node agents/dist-threads.js 
 
      - name: Distribute — Facebook Page 
        if: steps.check.outputs.has_campaign == 'true' 
        env: 
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ 
secrets.FACEBOOK_PAGE_ACCESS_TOKEN }} 
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }} 
          CONTENT_FILE: campaigns/${{ steps.check.outputs.week }}/text/facebook-post.md 
        run: node agents/dist-facebook.js 
 
      - name: Distribute — Instagram 
        if: steps.check.outputs.has_campaign == 'true' 
        env: 
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }} 
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }} 
          CONTENT_FILE: campaigns/${{ steps.check.outputs.week 
}}/text/instagram-reels-scripts.md 
        run: node agents/dist-instagram.js 
 
      - name: Distribute — Pinterest 
        if: steps.check.outputs.has_campaign == 'true' 
        env: 
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }} 
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }} 
          CONTENT_FILE: campaigns/${{ steps.check.outputs.week }}/text/pinterest-pins.md 
        run: node agents/dist-pinterest.js 
 
      - name: Distribute — Beehiiv newsletter draft 
        if: steps.check.outputs.has_campaign == 'true' 
        env: 
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }} 
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }} 
          CONTENT_FILE: campaigns/${{ steps.check.outputs.week }}/text/newsletter.md 
        run: node agents/dist-beehiiv.js 
 
      - name: Distribute — GitHub blog deploy 
        if: steps.check.outputs.has_campaign == 'true' 
        run: node agents/dist-github.js 
 
      - name: Update profile README 
        if: steps.check.outputs.has_campaign == 'true' 
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        run: node agents/profile-readme-agent.js 
 
      - name: Prepare manual posts (Reddit, Quora, TikTok, Community) 
        if: steps.check.outputs.has_campaign == 'true' 
        run: | 
          node agents/dist-reddit.js 
          node agents/dist-quora.js 
          node agents/dist-tiktok.js 
          node agents/dist-community.js 
          echo "" 
          echo "=== MANUAL POSTS READY ===" 
          ls campaigns/${{ steps.check.outputs.week }}/REDDIT_MANUAL_POST.md 
2>/dev/null && echo "Reddit: campaigns/${{ steps.check.outputs.week 
}}/REDDIT_MANUAL_POST.md" 
          ls campaigns/${{ steps.check.outputs.week }}/TIKTOK_MANUAL_RECORD.md 
2>/dev/null && echo "TikTok: campaigns/${{ steps.check.outputs.week 
}}/TIKTOK_MANUAL_RECORD.md" 
          ls campaigns/${{ steps.check.outputs.week }}/COMMUNITY_MANUAL_POSTS.md 
2>/dev/null && echo "Community: campaigns/${{ steps.check.outputs.week 
}}/COMMUNITY_MANUAL_POSTS.md" 
 
      - name: Log distribution completion 
        if: steps.check.outputs.has_campaign == 'true' 
        run: | 
          ENTRY="{\"week\":\"${{ steps.check.outputs.week }}\",\"distributed_at\":\"$(date -u 
+%Y-%m-%dT%H:%M:%SZ)\",\"trigger\":\"scheduled_friday\"}" 
          echo "$ENTRY" >> analytics/distribution-log.jsonl 
          git config user.name "AMAE" 
          git config user.email "amae@github.com" 
          git add analytics/distribution-log.jsonl campaigns/${{ steps.check.outputs.week }}/ 
          git diff --staged --quiet || git commit -m "chore: distribution log — ${{ 
steps.check.outputs.week }}" 
          git push 
 
      - name: Summary 
        if: steps.check.outputs.has_campaign == 'true' 
        run: | 
          echo "## Distribution Complete — ${{ steps.check.outputs.week }}" 
          echo "Auto-posted: LinkedIn, Twitter/X, Threads, Facebook, Instagram, Pinterest, 
Beehiiv (draft), Blog" 
          echo "MANUAL REQUIRED: Reddit, TikTok (record), Quora, Community seeding, 
Newsletter (send)" 
          echo "Newsletter note: Beehiiv draft created — review and send manually"