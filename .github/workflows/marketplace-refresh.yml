# ================================================================ 
# AMAE — Monthly Marketplace Listing Refresh 
# Schedule: 1st of every month, 8:00am UTC 
# Refreshes Product Hunt, G2, Capterra, AppSumo listings 
# ================================================================ 
 
name: Monthly Marketplace Refresh 
 
on: 
  schedule: 
    - cron: '0 8 1 * *'   # 1st of every month, 8am UTC 
  workflow_dispatch: 
 
permissions: 
  contents: write 
  pull-requests: write 
 
jobs: 
  refresh: 
    name: Refresh Marketplace Listings 
    runs-on: ubuntu-latest 
    timeout-minutes: 30 
 
    steps: 
      - name: Checkout repository 
        uses: actions/checkout@v4 
 
      - name: Set up Node.js 20 
        uses: actions/setup-node@v4 
        with: 
          node-version: '20' 
          cache: 'npm' 
 
      - name: Install dependencies 
        run: npm ci --prefer-offline 
 
      - name: Run Marketplace Agent 
        run: node agents/marketplace-agent.js --mode=refresh 
        env: 
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }} 
 
      - name: Get current month 
        id: meta 
        run: echo "MONTH=$(date +'%Y-%m')" >> $GITHUB_OUTPUT 
 
      - name: Create PR for marketplace updates 
        uses: peter-evans/create-pull-request@v6 
        with: 
          token: ${{ secrets.GITHUB_TOKEN }} 
          branch: marketplace/${{ steps.meta.outputs.MONTH }} 
          base: main 
          commit-message: "marketplace: monthly refresh ${{ steps.meta.outputs.MONTH }}" 
          title: "🏪 Marketplace Refresh — ${{ steps.meta.outputs.MONTH }}" 
          body: | 
            ## Monthly Marketplace Listing Updates 
 
            Review and approve updated copy for all marketplace listings. 
 
            - [ ] Product Hunt — updated tagline and description 
            - [ ] G2 — updated feature list and review request templates 
            - [ ] Capterra — updated listing copy 
            - [ ] AppSumo — updated deal description (if listed) 
            - [ ] Indie Hackers — monthly milestone post 
 
            **Submit listings manually after reviewing.** 
          labels: marketplace