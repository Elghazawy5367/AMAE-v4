# ================================================================ 
# AMAE — Monthly Growth Tasks 
# Schedule: Last Sunday of each month, 10:00pm UTC 
# Tasks: Awesome list PRs, topic audit, AEO swipe file update 
# ================================================================ 
 
name: Monthly Growth Tasks 
 
on: 
  schedule: 
    - cron: '0 22 25-31 * 0'   # Last Sunday of month, 10pm UTC 
  workflow_dispatch: 
 
permissions: 
  contents: write 
  pull-requests: write 
 
jobs: 
  awesome-lists: 
    name: Submit Awesome List PRs 
    runs-on: ubuntu-latest 
    timeout-minutes: 20 
 
    steps: 
      - name: Checkout repository 
        uses: actions/checkout@v4 
 
      - name: Set up Node.js 20 
        uses: actions/setup-node@v4 
        with: 
          node-version: '20' 
          cache: 'npm' 
 
      - name: Install dependencies 
        run: npm ci --prefer-offline 
 
      - name: Run Awesome List Agent 
        run: node agents/awesome-list-agent.js 
        env: 
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }} 
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }} 
 
      - name: Run Citation Tracker 
        run: node agents/citation-tracker.js 
        env: 
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }} 
 
      - name: Commit monthly intelligence updates 
        run: | 
          git config user.name  "AMAE Growth Bot" 
          git config user.email "amae-bot@noreply.github.com" 
          git add intelligence/ memory/citations.json 
          git diff --cached --quiet && echo "No monthly changes" || \ 
            git commit -m "growth: monthly audit $(date +'%Y-%m') [skip ci]" && \ 
            git push origin main